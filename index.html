<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamUp</title>

  <!-- Open Graph — controls the iMessage link preview card -->
  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="StreamUp" />
  <meta property="og:title"       content="Open in StreamUp" />
  <meta property="og:description" content="Tap to open this title in StreamUp and start watching." />
  <meta property="og:image"       content="https://iariam.github.io/og-image.png" />
  <meta property="og:url"         content="https://iariam.github.io" />

  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Open in StreamUp" />
  <meta name="twitter:description" content="Tap to open this title in StreamUp and start watching." />
  <meta name="twitter:image"       content="https://iariam.github.io/og-image.png" />

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a12;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      color: #fff;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .logo { font-size: 48px; margin-bottom: 8px; }
    h1 { font-size: 28px; font-weight: 700; margin: 0 0 8px; }
    p  { color: rgba(255,255,255,0.6); font-size: 16px; margin: 0 0 32px; }
    a.btn {
      display: inline-block;
      background: #57c7f2;
      color: #000;
      font-weight: 700;
      font-size: 16px;
      padding: 14px 32px;
      border-radius: 100px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="logo">▶️</div>
  <h1>StreamUp</h1>
  <p>Your personal streaming hub for movies &amp; TV shows.</p>
  <a class="btn" href="streamup://">Open StreamUp</a>

  <script>
    // Auto-redirect to the app deep link based on the path
    // e.g. /movie/12345  →  streamup://movie/12345
    const parts = window.location.pathname.split('/').filter(Boolean);
    if (parts.length >= 2 && (parts[0] === 'movie' || parts[0] === 'show')) {
      window.location.href = 'streamup://' + parts[0] + '/' + parts[1];
    }
  </script>
</body>
</html>
