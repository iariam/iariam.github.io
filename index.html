<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamUp — Open this title</title>

  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="StreamUp" />
  <meta property="og:title"       content="Open in StreamUp ▶" />
  <meta property="og:description" content="Tap to open this title in StreamUp." />
  <meta property="og:url"         content="https://iariam.github.io" />

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      background:#08080f;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
      color:#fff;text-align:center;padding:32px 24px;
    }
    .icon{font-size:60px;margin-bottom:18px}
    h1{font-size:28px;font-weight:700;margin-bottom:10px}
    p{color:rgba(255,255,255,.55);font-size:16px;margin-bottom:36px;line-height:1.6}
    .btn{
      display:inline-block;background:#57c7f2;color:#000;
      font-weight:700;font-size:18px;padding:16px 40px;
      border-radius:100px;text-decoration:none;border:none;cursor:pointer;
    }
    .sub{margin-top:18px;font-size:12px;color:rgba(255,255,255,.3)}
  </style>
</head>
<body>
  <div class="icon">▶️</div>
  <h1>Open in StreamUp</h1>
  <p id="msg">Someone shared a title with you.</p>
  <a class="btn" id="openBtn" href="streamup://">Open StreamUp</a>
  <p class="sub">StreamUp — Your personal streaming hub</p>

  <script>
    var hash = location.hash.replace('#','');
    var parts = hash.split('/').filter(Boolean);
    if(parts.length >= 2 && (parts[0]==='movie' || parts[0]==='show')){
      var deepLink = 'streamup://' + parts[0] + '/' + parts[1];
      document.getElementById('openBtn').href = deepLink;
      document.getElementById('msg').textContent =
        'Tap the button to open this title in StreamUp.';
    }
  </script>
</body>
</html>
