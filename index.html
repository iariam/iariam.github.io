<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamUp — Watch Together</title>

  <!-- Open Graph — iMessage fetches these for the rich card preview -->
  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="StreamUp" />
  <meta property="og:title"       content="Check this out on StreamUp ▶" />
  <meta property="og:description" content="Open in StreamUp to start watching." />
  <meta property="og:url"         content="https://iariam.github.io" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #08080f;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      color: #fff;
      text-align: center;
      padding: 32px 24px;
    }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1   { font-size: 30px; font-weight: 700; margin-bottom: 10px; }
    p    { color: rgba(255,255,255,0.55); font-size: 17px; margin-bottom: 36px; line-height: 1.5; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #57c7f2;
      color: #000;
      font-weight: 700;
      font-size: 17px;
      padding: 15px 36px;
      border-radius: 100px;
      text-decoration: none;
    }
    .sub { margin-top: 20px; font-size: 13px; color: rgba(255,255,255,.3); }
  </style>
</head>
<body>
  <div class="icon">▶️</div>
  <h1>Open in StreamUp</h1>
  <p>Someone shared a title with you.<br>Tap below to open it in the StreamUp app.</p>
  <a class="btn" id="openBtn" href="streamup://">Open StreamUp</a>
  <p class="sub">StreamUp — Your personal streaming hub</p>

  <script>
    // Hash fragment: #movie/12345 or #show/12345
    const hash = window.location.hash.replace('#', '');
    const parts = hash.split('/').filter(Boolean);
    if (parts.length >= 2 && (parts[0] === 'movie' || parts[0] === 'show')) {
      const deepLink = 'streamup://' + parts[0] + '/' + parts[1];
      document.getElementById('openBtn').href = deepLink;
      setTimeout(() => { window.location.href = deepLink; }, 300);
    }
  </script>
</body>
</html>
